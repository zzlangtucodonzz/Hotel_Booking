<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Wanderly</title>
  <meta name="description" content="Sign in to your Wanderly account to continue discovering curated travel experiences across Vietnam.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

  <main class="auth-page" id="auth-login-page">

    <!-- ===== LEFT PANEL — Sign In Form ===== -->
    <section class="auth-left" aria-label="Sign in form">
      <div class="auth-logo" id="auth-logo">
        <span class="logo-dot"></span> WANDERLY
      </div>

      <h1 class="auth-heading">Welcome back, traveller.</h1>
      <p class="auth-subtitle">Sign in to continue your journey with us.</p>

      <form class="auth-form" id="login-form" onsubmit="return false;">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <div class="form-options">
          <label class="remember-me" for="remember-checkbox">
            <input type="checkbox" id="remember-checkbox" name="remember">
            Remember me
          </label>
          <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-auth-primary" id="login-submit-btn">SIGN IN</button>
      </form>

      <div class="social-divider">
        <span>or continue with</span>
      </div>

      <div class="social-buttons">
        <button type="button" class="btn-social" id="btn-google-login" aria-label="Sign in with Google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button type="button" class="btn-social" id="btn-gmail-login" aria-label="Sign in with Gmail">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z" fill="#EA4335"/>
          </svg>
          Gmail
        </button>
      </div>

      <p class="auth-redirect">
        New to Wanderly? <a href="register.html" id="goto-register-link">Create an account</a>
      </p>
    </section>

    <!-- ===== RIGHT PANEL — Scenic Image ===== -->
    <aside class="auth-right" aria-label="Scenic travel photography">
      <div class="auth-image-wrapper">
        <img src="assets/images/ninhbinh-landscape.png" alt="Ninh Binh, Vietnam — limestone karsts rising above green rice paddies in warm daylight" loading="eager">
        <div class="auth-image-quote">
          <p class="quote-text">"Every window opens to a story waiting to be lived."</p>
          <p class="quote-location">Ninh Binh <span>_</span> VIETNAM</p>
        </div>
      </div>
    </aside>

  </main>

  <script>
    const loginForm = document.getElementById('login-form');
    const loginSubmitBtn = document.getElementById('login-submit-btn');

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        alert('Please enter both email and password.');
        return;
      }

      loginSubmitBtn.disabled = true;
      loginSubmitBtn.textContent = 'SIGNING IN…';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || 'Login failed. Please try again.');
        }

        // Persist auth data for use across pages
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Role-based redirect from server response
        window.location.href = data.redirectUrl;
      } catch (error) {
        alert(error.message);
      } finally {
        loginSubmitBtn.disabled = false;
        loginSubmitBtn.textContent = 'SIGN IN';
      }
    });
  </script>

</body>
</html>
